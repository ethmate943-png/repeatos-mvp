# Full build check — mirrors what you run on Koyeb (API + widget + Next.js).
# Push/PR must pass before deploy; Koyeb can stay "build on push" without extra config.

name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    env:
      # Next.js reads these at build time in some paths; placeholders avoid flaky builds in CI.
      REPEATOS_API_URL: http://127.0.0.1:4000
      NEXT_PUBLIC_REPEATOS_API_URL: http://127.0.0.1:4000
      REPEATOS_ADMIN_API_KEY: ci-build-placeholder
      DASHBOARD_MODE: tenant
      DEFAULT_BUSINESS_ID: 00000000-0000-0000-0000-000000000000

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: |
            package-lock.json
            apps/api/package-lock.json
            apps/web/package-lock.json
            apps/widget/package-lock.json

      - name: Install dependencies (root)
        run: npm ci

      - name: Install dependencies (apps/api)
        run: npm ci --prefix apps/api

      - name: Install dependencies (apps/web)
        run: npm ci --prefix apps/web

      - name: Install dependencies (apps/widget)
        run: npm ci --prefix apps/widget

      - name: Build widget + compile API (root script)
        run: npm run build

      - name: Build Next.js (dashboard + hosted menu)
        run: npm run build --prefix apps/web

      - name: API unit tests
        run: npm test --prefix apps/api

      - name: Web lint
        run: npm run lint --prefix apps/web
